name: eduon
description: "Free courses from YouTube - organized by category"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  chat_gpt_sdk: ^3.1.5
  dash_chat_2: ^0.0.21
  dio: ^5.9.2
  equatable: ^2.0.8
  firebase_auth: ^6.4.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_inappwebview: ^6.1.5
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  google_generative_ai: ^0.4.7
  google_sign_in: ^7.2.0
  image_picker: ^1.2.1
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  url_launcher: ^6.3.2
  youtube_player_flutter: ^9.1.3



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/svg/
    - assets/gif/

  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
